version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: url_shortener_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortener
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: url_shortener_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
